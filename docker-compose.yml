# Local development defaults:
# - Postgres: postgresql://forgeloop:forgeloop@localhost:5432/forgeloop
# - Redis: redis://localhost:6379
# - Temporal: localhost:7233
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forgeloop
      POSTGRES_PASSWORD: forgeloop
      POSTGRES_DB: forgeloop
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U forgeloop -d forgeloop']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: forgeloop
      POSTGRES_PWD: forgeloop
      POSTGRES_SEEDS: postgres
    ports:
      - '7233:7233'

volumes:
  postgres-data:
  redis-data:
